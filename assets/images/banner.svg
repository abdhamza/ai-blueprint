<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Blueprint — technical learning path from fundamentals to production">
  <defs>
    <radialGradient id="ground" cx="42%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#123A66"/>
      <stop offset="100%" stop-color="#081B33"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#F2F7FC" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- ground -->
  <rect width="1200" height="340" fill="url(#ground)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>

  <!-- frame -->
  <rect x="16" y="16" width="1168" height="308" fill="none" stroke="#F2F7FC" stroke-opacity="0.55" stroke-width="2"/>

  <!-- corner crop marks -->
  <g stroke="#F2F7FC" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="square">
    <path d="M4 20V4H20" fill="none"/>
    <path d="M1196 20V4H1180" fill="none"/>
    <path d="M4 320V336H20" fill="none"/>
    <path d="M1196 320V336H1180" fill="none"/>
  </g>

  <!-- title lockup -->
  <text x="48" y="132" font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="56" letter-spacing="3" fill="#F2F7FC">AI BLUEPRINT</text>
  <line x1="50" y1="150" x2="430" y2="150" stroke="#6FC8EA" stroke-opacity="0.8" stroke-width="1.5"/>
  <text x="50" y="174" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="13" letter-spacing="2" fill="#B7D4EA" fill-opacity="0.85">TECHNICAL LEARNING PATH — FUNDAMENTALS TO PRODUCTION</text>

  <!-- schematic flow: the learning path as a circuit trace -->
  <g fill="none" stroke="#F2F7FC" stroke-opacity="0.5" stroke-width="1.5">
    <path d="M440 222 H509 V120 H578"/>
    <path d="M578 120 H647 V222 H716"/>
    <path d="M716 222 H785 V120 H854"/>
    <path d="M854 120 H923 V222 H992"/>
    <path d="M992 222 H1061 V120 H1130"/>
  </g>

  <!-- nodes 1-5 -->
  <g fill="#0E2F58" stroke="#F2F7FC" stroke-width="2">
    <rect x="433" y="215" width="14" height="14"/>
    <rect x="571" y="113" width="14" height="14"/>
    <rect x="709" y="215" width="14" height="14"/>
    <rect x="847" y="113" width="14" height="14"/>
    <rect x="985" y="215" width="14" height="14"/>
  </g>

  <!-- node 6: destination, single accent -->
  <circle cx="1130" cy="120" r="13" fill="none" stroke="#FFC24B" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="1122" y="112" width="16" height="16" fill="#FFC24B" stroke="#FFC24B" stroke-width="2"/>

  <!-- labels -->
  <g font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="13" letter-spacing="1" text-anchor="middle" fill="#F2F7FC" fill-opacity="0.92">
    <text x="440" y="256">FUNDAMENTALS</text>
    <text x="578" y="100">ML &amp; DL</text>
    <text x="716" y="256">LLMS</text>
    <text x="854" y="100">RAG</text>
    <text x="992" y="256">AGENTS</text>
    <text x="1130" y="100" fill="#FFC24B" font-weight="700">MCP</text>
  </g>

  <!-- title block -->
  <line x1="32" y1="300" x2="1168" y2="300" stroke="#6FC8EA" stroke-opacity="0.35" stroke-width="1"/>
  <text x="32" y="316" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#6FC8EA" fill-opacity="0.6">OPEN-SOURCE LEARNING REPOSITORY</text>
  <text x="1168" y="316" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#6FC8EA" fill-opacity="0.6">DWG AI-BP-001    SCALE NTS    REV A</text>
</svg>
